<!-- Footer -->
<footer class="footer">
  <div class="footer-content">
    <div class="footer-links">
      <h5>推荐网站</h5>
      <ul class="recommended-links">
        <li><a href="https://github.com" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://stackoverflow.com" target="_blank" rel="noopener">Stack Overflow</a></li>
        <li><a href="https://juejin.cn" target="_blank" rel="noopener">掘金</a></li>
        <li><a href="https://www.zhihu.com" target="_blank" rel="noopener">知乎</a></li>
        <li><a href="https://medium.com" target="_blank" rel="noopener">Medium</a></li>
        <li><a href="https://dev.to" target="_blank" rel="noopener">DEV Community</a></li>
      </ul>
    </div>
    <div class="footer-info">
      <p class="footer-copyright">
        Copyright © {{ now.Year }} {{ .Site.Title }} · Powered by <a href="https://gohugo.io" target="_blank" rel="noopener">Hugo</a>
      </p>
      <p class="footer-copyright" style="margin-top: 0.5rem; font-size: 0.8rem;">
        Design inspired by <a href="https://huangxuan.me" target="_blank" rel="noopener">Hux Blog</a>
      </p>
    </div>
  </div>
</footer>

{{ if .Site.Params.enableBackToTop }}
<!-- Back to top -->
<button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>
{{ end }}

{{ if .Site.Params.enableSearch }}
<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <button class="search-close" id="searchClose">×</button>
  <div class="search-box">
    <input type="text" class="search-input" placeholder="搜索文章..." id="searchInput">
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
{{ end }}
